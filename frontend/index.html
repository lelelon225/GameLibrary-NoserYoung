<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Grand — Game Library</title>
  <link rel="stylesheet" href="style.css" />

</head>
<body>
  <div class="page">

    <!-- ── Hero ────────────────────────────────────── -->
    <section class="hero">
      <h1 class="hero-title">Choose Your<br /><span>Game</span></h1>
    </section>

    <div class="ornament"><div class="ornament-diamond"></div></div>

    <!-- ── Game Grid ────────────────────────────────── -->
    <div class="games-section-label">
      <span class="section-title">All Games</span>
      <span class="label-upper">2 titles</span>
    </div>

    <div class="games-grid">

      <!-- Roulette — AVAILABLE -->
      <a class="game-card" href="roulette/roulette.html">
        <div class="game-card-art-wrap">
          <div class="game-art art-roulette">🎡</div>
          <div class="play-overlay">
            <div class="play-btn-circle">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </div>
          </div>
          <div class="card-badge-pos"><span class="badge badge-new">Available</span></div>
        </div>
        <div class="game-card-body">
          <div class="game-card-title">Roulette</div>
          <div class="game-card-desc">Spin the wheel and bet on numbers, colours, or ranges. European single-zero rules.</div>
          <div class="game-card-meta">
            <span class="game-card-odds">House edge <strong>2.7%</strong></span>
            <span class="badge">35 : 1 max</span>
          </div>
        </div>
      </a>

      <div class="game-card game-card-disabled">
        <div class="game-card-art-wrap">
          <div class="game-art art-slots">🎰</div>
          <div class="card-badge-pos"><span class="badge badge-coming">Coming Soon</span></div>
        </div>
        <div class="game-card-body">
          <div class="game-card-title">Slots</div>
          <div class="game-card-desc">Three reels, seven symbols, one lever. Classic one-armed-bandit mechanics with multipliers.</div>
          <div class="game-card-meta">
            <span class="game-card-odds">RTP <strong>96%</strong></span>
            <span class="badge">Up to 500×</span>
          </div>
        </div>
      </div>


    </div>

  </div>
</body>
</html>
